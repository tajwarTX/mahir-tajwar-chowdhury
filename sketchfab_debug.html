<!DOCTYPE html>
<html>
<head>
  <title>Sketchfab Annotation Extractor</title>
  <style>
    body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
    #output { background: #222; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; max-height: 600px; overflow-y: auto; }
    button { background: #a600ff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
    iframe { border: none; width: 100%; height: 400px; }
  </style>
</head>
<body>
  <h2>Sketchfab Annotation Extractor</h2>
  <p>Loading model... wait for it to initialize, then click buttons below.</p>

  <div id="api-frame-container">
    <iframe
      src="https://sketchfab.com/models/f0b58827689e45c28ba58b4c5c1a02e9/embed?api_version=1.0.0"
      id="api-frame"
      allow="autoplay; fullscreen; xr-spatial-tracking"
      allowfullscreen
    ></iframe>
  </div>

  <div style="margin-top:10px;">
    <button onclick="getAnnotations()">Get All Annotations</button>
    <button onclick="getCamera()">Get Current Camera</button>
    <button onclick="gotoAnnotation(0)">Go To Ann #1</button>
    <button onclick="gotoAnnotation(1)">Go To Ann #2</button>
    <button onclick="gotoAnnotation(2)">Go To Ann #3</button>
    <button onclick="gotoAnnotation(3)">Go To Ann #4</button>
    <button onclick="gotoAnnotation(4)">Go To Ann #5</button>
    <button onclick="gotoAnnotation(5)">Go To Ann #6</button>
  </div>

  <div id="output">Waiting for API to initialize...</div>

  <script type="text/javascript" src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
  <script>
    var client;
    var api;
    var outputDiv = document.getElementById('output');

    function log(msg) {
      outputDiv.textContent += '\n' + msg;
      outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    window.addEventListener('DOMContentLoaded', function() {
      var iframe = document.getElementById('api-frame');
      client = new Sketchfab(iframe);

      client.init('f0b58827689e45c28ba58b4c5c1a02e9', {
        success: function(sketchfabApi) {
          api = sketchfabApi;
          api.start();
          api.addEventListener('viewerready', function() {
            log('✅ Viewer ready! Click buttons above to extract data.');
          });
          api.addEventListener('annotationFocus', function(index) {
            log('📍 Annotation focused: #' + (index+1));
            setTimeout(function() { getCamera(); }, 1500);
          });
        },
        error: function() { log('❌ Error initializing API'); }
      });
    });

    function getAnnotations() {
      if (!api) { log('API not ready yet'); return; }
      api.getAnnotationList(function(err, annotations) {
        if (err) { log('Error: ' + err); return; }
        log('\n=== ALL ANNOTATIONS ===');
        log(JSON.stringify(annotations, null, 2));
      });
    }

    function getCamera() {
      if (!api) { log('API not ready yet'); return; }
      api.getCameraLookAt(function(err, camera) {
        if (err) { log('Error: ' + err); return; }
        log('\n=== CAMERA ===');
        log('Position: [' + camera.position.map(n=>n.toFixed(4)).join(', ') + ']');
        log('Target:   [' + camera.target.map(n=>n.toFixed(4)).join(', ') + ']');
      });
    }

    function gotoAnnotation(index) {
      if (!api) { log('API not ready yet'); return; }
      api.gotoAnnotation(index, {preventCameraAnimation: false}, function(err, index) {
        if (err) { log('Error: ' + err); return; }
        log('\nNavigated to annotation #' + (index+1));
        setTimeout(function() { getCamera(); }, 2000);
      });
    }
  </script>
</body>
</html>
